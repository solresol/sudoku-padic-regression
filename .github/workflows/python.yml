name: Python CI

on:
  pull_request:
    paths:
      - ".github/workflows/python.yml"
      - "code/**"
      - "fixtures/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/python.yml"
      - "code/**"
      - "fixtures/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test Python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest
